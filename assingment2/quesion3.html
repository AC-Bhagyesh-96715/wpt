<!DOCTYPE html>
<html>
<head>
    <title>Sunbeam Registration Form</title>
</head>

<body bgcolor="#eaeaea">

<!-- Logo -->
<img src="sunbeam.png" width="300">

<h1>Sunbeam Registration Form</h1>

<!-- Main Layout using TABLE -->
<table>
<tr>

    <!-- Left Side: Video -->
    <td>
        <iframe width="420" height="240"
        src="https://www.youtube.com/embed/ysz5S6PUM-U">
        </iframe>
    </td>

    <!-- Right Side: Form -->
    <td valign="top">

        <form>

            Name:
            <input type="text"><br><br>

            BirthDate:
            <input type="date"><br><br>

            Email:
            <input type="email"><br><br>

            Password:
            <input type="password"><br><br>

            Address:
            <br>
            <textarea rows="4" cols="25">
Sunbeam Institute of IT
'Anuda Chambers', 203
Shaniwar Peth, Near
Gujar Hospital, Karad-415110
            </textarea><br><br>

            Gender:
            <input type="radio" name="g"> Male
            <input type="radio" name="g"> Female<br><br>

            Upload Photo:
            <input type="file"><br><br>

            Select your Course:
            <select>
                <option>Select course</option>
                <option>Java</option>
                <option>CPP</option>
                <option>OS</option>
            </select><br><br>

            Skill Set:
            <input type="checkbox"> Java
            <input type="checkbox"> CPP
            <input type="checkbox"> OS<br><br>

            <input type="submit" value="Register">
            <input type="reset" value="Clear">

        </form>

    </td>

</tr>
</table>

</body>
</html>
